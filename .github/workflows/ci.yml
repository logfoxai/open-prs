name: CI
on:
  pull_request:
    branches: [main]
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 open-prs --max-line-length=120 --ignore=E501,W503,E241
  test:
    name: Smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Help works
        run: python open-prs --help 2>&1 | grep -q "Usage"
      - name: Version works
        run: |
          python open-prs --version | grep -qE '^open-prs (dev|[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+-g[0-9a-f]+)?)$'
          python open-prs -v | grep -qE '^open-prs (dev|[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+-g[0-9a-f]+)?)$'
          test "$(python open-prs --version)" = "$(python open-prs -v)"
          NEXT_VERSION=1.2.3 python open-prs --version | grep -qx "open-prs 1.2.3"
      - name: No args exits 1
        run: '! python open-prs'
      - name: Fetch PRs (with GITHUB_TOKEN)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update && sudo apt-get install -y gh
          python open-prs logfoxai --once --plain | grep -q "open"
